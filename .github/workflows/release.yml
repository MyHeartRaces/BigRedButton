name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        default: "v0.2.0"

permissions:
  contents: write

env:
  GO_VERSION: 1.24.x
  BINARY_NAME: big-red-button
  GUI_BINARY_NAME: big-red-button-gui
  VERSION: 0.2.0

jobs:
  windows-11-arm64:
    name: Windows 11 arm64
    runs-on: windows-11-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Test
        shell: pwsh
        run: go test ./...

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/windows-arm64" | Out-Null
          $env:CGO_ENABLED = "0"
          go build -trimpath -buildvcs=false -ldflags "-s -w" -o "dist/windows-arm64/${{ env.BINARY_NAME }}.exe" "./cmd/${{ env.BINARY_NAME }}"
          go build -trimpath -buildvcs=false -ldflags "-s -w -H windowsgui" -o "dist/windows-arm64/${{ env.GUI_BINARY_NAME }}.exe" "./cmd/${{ env.GUI_BINARY_NAME }}"

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/windows-arm64/${{ env.BINARY_NAME }}.exe", "dist/windows-arm64/${{ env.GUI_BINARY_NAME }}.exe", "README.md", "LICENSE" `
            -DestinationPath "dist/${{ env.BINARY_NAME }}_windows_11_arm64.zip" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}_windows_11_arm64
          path: dist/${{ env.BINARY_NAME }}_windows_11_arm64.zip
          if-no-files-found: error

  windows-amd64:
    name: Windows amd64 compatible
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Test
        shell: pwsh
        run: go test ./...

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/windows-amd64" | Out-Null
          $env:CGO_ENABLED = "0"
          go build -trimpath -buildvcs=false -ldflags "-s -w" -o "dist/windows-amd64/${{ env.BINARY_NAME }}.exe" "./cmd/${{ env.BINARY_NAME }}"
          go build -trimpath -buildvcs=false -ldflags "-s -w -H windowsgui" -o "dist/windows-amd64/${{ env.GUI_BINARY_NAME }}.exe" "./cmd/${{ env.GUI_BINARY_NAME }}"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "iscc"
          }
          $sourceDir = (Resolve-Path "dist\windows-amd64").Path
          $outputDir = (Resolve-Path "dist").Path
          $repoDir = (Resolve-Path ".").Path
          & $iscc `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DRepoDir=$repoDir" `
            "/DAppVersion=${{ env.VERSION }}" `
            "packaging/windows/BigRedButton.iss"

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/windows-amd64/${{ env.BINARY_NAME }}.exe", "dist/windows-amd64/${{ env.GUI_BINARY_NAME }}.exe", "README.md", "LICENSE" `
            -DestinationPath "dist/${{ env.BINARY_NAME }}_windows_amd64.zip" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}_windows_amd64
          path: |
            dist/${{ env.BINARY_NAME }}_windows_amd64.zip
            dist/BigRedButtonSetup-${{ env.VERSION }}-windows-amd64.exe
          if-no-files-found: error

  macos-arm64:
    name: macOS arm64
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Test
        run: go test ./...

      - name: Build package
        run: |
          VERSION="${VERSION}" ./scripts/build-macos-package.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}_darwin_arm64
          path: |
            dist/macos/${{ env.BINARY_NAME }}_darwin_arm64.pkg
            dist/macos/${{ env.BINARY_NAME }}_darwin_arm64_app.zip
          if-no-files-found: error

  arch-linux:
    name: Arch Linux package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build package in Arch Linux
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            archlinux:base-devel \
            bash -lc '
              set -euo pipefail
              pacman -Syu --noconfirm --needed base-devel git go sudo
              useradd -m builder
              printf "builder ALL=(ALL) NOPASSWD: ALL\n" > /etc/sudoers.d/builder
              chmod 0440 /etc/sudoers.d/builder
              mkdir -p /workspace/dist
              chown -R builder:builder /workspace/dist /home/builder
              chmod -R a+rX /workspace
              runuser -u builder -- bash -lc "cd /workspace && git config --global --add safe.directory /workspace && go test ./... && ./scripts/build-arch-package.sh"
              chmod -R a+rX /workspace/dist
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}_archlinux_pkg
          path: |
            dist/arch/makepkg/${{ env.BINARY_NAME }}-*.pkg.tar.*
            !dist/arch/makepkg/${{ env.BINARY_NAME }}-debug-*.pkg.tar.*
            dist/arch/makepkg/${{ env.BINARY_NAME }}-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - windows-11-arm64
      - windows-amd64
      - macos-arm64
      - arch-linux

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          {
            echo "tag=${tag}"
            echo "title=Big Red Button ${tag}"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<EOF
          Big Red Button ${tag}

          Alpha release for early testing.

          Assets:
          - Windows amd64 installer
          - Windows 11 arm64 ZIP
          - Windows amd64 ZIP
          - macOS arm64 installer package
          - macOS arm64 app ZIP
          - Arch Linux package
          - SHA256SUMS
          EOF

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum * > SHA256SUMS
          ls -la

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            gh release create "${TAG_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --prerelease
          fi
